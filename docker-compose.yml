services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: restext
      POSTGRES_PASSWORD: restext
      POSTGRES_DB: restext
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  qdrant_data:
